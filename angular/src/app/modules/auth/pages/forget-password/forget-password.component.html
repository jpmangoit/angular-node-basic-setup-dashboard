<main class="d-flex w-100 main-block">
    <div class="container d-flex flex-column">
        <div class="row vh-100">
            <div class="col-sm-10 col-md-8 col-lg-6 mx-auto d-table h-100">
                <div class="d-table-cell align-middle">
                    <div class="text-center min-logo pt-4 mb-3">
                        <img src="../../../../../assets/img/KnightNetwork.png" alt="Charles Hall"
                            class="img-fluid" width="200" />
                    </div>
                    
                    <div class="card">
                        <div class="card-body">
                            <div class="m-sm-4">
                                <div class="text-center mt-4 signuphead">
                                    <p class="h2 text-gray-900 mb-2">Forgot Password</p>
                                    <p>Enter your email address. You will receive an email with a link to reset your password.</p>
                                </div>

                                <form class="user" [formGroup]="forgetPassword" (ngSubmit)="onSubmit()">
                                    <div class="card-body">
                                        <label class="form-label">Email</label>
                                        <div class="mb-3">
                                            <input type="email" class="form-control" id="exampleInputEmail" aria-describedby="emailHelp" placeholder="Enter Email Address" name="email" formControlName="email" />
                                            <span class="text-danger" *ngIf="isSubmitted && formControls['email'].errors">Email is
                                                required</span>
                                        </div>

                                        <div class="text-center mb-3 btn-main">
                                            <button type="submit" class="btn btn-info w-50 mt-4 mb-0">Submit</button>
                                        </div>
                                        <div class="forget-pwd">
                                        <p class="text-center">Back to login? <span><b class="done" [routerLink]="['/auth/login']"
                                                    routerLinkActive="router-link-active">Click here</b></span></p>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</main>
