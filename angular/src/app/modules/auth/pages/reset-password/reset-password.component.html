
<main class="d-flex w-100 main-block">
    <div class="container d-flex flex-column">
        <div class="row vh-100">
            <div class="col-sm-10 col-md-8 col-lg-6 mx-auto d-table h-100">
                <div class="d-table-cell align-middle">                    
                    <div class="text-center min-logo pt-4 mb-3">
                        <img src="../../../../../assets/img/KnightNetwork.png" alt="Charles Hall"
                            class="img-fluid" width="200" />
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <div class="m-sm-4">
                                <div class="text-center mt-4 top-heading signuphead">
                                    <p class="h2 text-gray-900 mb-2">Reset Password</p>
                                    <p class="lead">Enter your new password.</p>
                                </div>

                                <form class="user" [formGroup]="resetPassword" (ngSubmit)="onSubmit()">
                                    <div class="card-body">
                                        <div class="form-group mb-3">
                                            <label class="form-label">Password</label>
                                            <input type="password" class="form-control" id="exampleInputPassword"
                                                aria-describedby="emailHelp" placeholder="Enter password"
                                                name="password" formControlName="password"
                                                [ngClass]="{ 'is-invalid': isSubmitted && formControls['password'].errors }">
                                            <span class="danger"
                                                *ngIf="isSubmitted && formControls.password.errors?.required">
                                                Password is required
                                            </span>
                                            <span class="danger"
                                                *ngIf="(formControls['password'].touched || formControls['password'].dirty) && formControls['password'].invalid">
                                                <span *ngIf="formControls.password.errors?.minlength">
                                                    The "Password" field must be at least 6 characters
                                                </span>
                                            </span>
                                        </div>
                                        <div class="form-group mb-3">
                                            <label class="form-label">Confirm Password</label>

                                            <input type="password" class="form-control" id="exampleInputPassword"
                                                aria-describedby="emailHelp" placeholder="Enter confirm password"
                                                name="confirmPassword" formControlName="confirmPassword"
                                                [ngClass]="{ 'is-invalid': isSubmitted && formControls['confirmPassword'].errors }">
                                            <span class="danger"
                                                *ngIf="isSubmitted && formControls.confirmPassword.errors?.required && !formControls.confirmPassword.errors?.mustMatch">
                                                Confirm Password is required
                                            </span>
                                            <span class="danger"
                                                *ngIf=" formControls['confirmPassword'].errors && formControls['confirmPassword'].errors['mustMatch']">
                                                Password and Confirm Password does not match</span>
                                        </div>

                                        <div class="form-group mt-3 .btn-main text-center">
                                            <button type="submit"
                                                class="btn btn-primary btn-block btn-real">Submit</button>
                                        </div>
                                        <div class="forget-pwd">
                                        <p class="text-center">Back to login? <span><b class="done" [routerLink]="['/auth/login']"
                                                    routerLinkActive="router-link-active">Click here</b></span></p>
                                        </div>
                                    </div>
                                </form>
                            </div>  
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</main>
