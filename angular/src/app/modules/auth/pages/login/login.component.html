<main class="d-flex w-100 main-block">
    <div class="container d-flex flex-column">
        <div class="row vh-100">
            <div class="col-sm-10 col-md-8 col-lg-6 mx-auto d-table h-100">
                <div class="d-table-cell align-middle">

                    <!-- <div class="text-center mt-4 top-heading">
                        <h1 class="h2">Welcome back</h1>
                        <p class="lead">
                            Sign in to your account to continue
                        </p>
                    </div> -->
                    <div class="text-center min-logo pb-2">
                        <img src="../../../../../assets/img/KnightNetwork.png" alt="Charles Hall" class="img-fluid" width="200" />
                    </div>

                    <div class="card">
                        <div class="card-body">
                            <div class="m-sm-4">

                                <div class="text-center mt-4 top-heading signuphead">
                                    <p class="h2">Welcome back</p>
                                    <p class="lead">
                                        Sign in to your account to continue
                                    </p>
                                </div>
                                <form class="user" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                                    <div class="card-body">
                                        <label>Email</label>
                                        <div class="mb-3">
                                            <input type="email" class="form-control" id="exampleInputEmail" aria-describedby="emailHelp" placeholder="Enter Email Address" name="email" formControlName="email" />
                                            <span class="danger" *ngIf="
                                                    isSubmitted &&
                                                    formControls['email'].errors
                                                ">
                                                Email is required
                                            </span>
                                        </div>
                                        <label>Password</label>
                                        <div class="mb-3">
                                            <input type="password" class="form-control" id="exampleInputPassword" placeholder="Password" name="password" formControlName="password" />
                                            <span class="danger" *ngIf="
                                                    isSubmitted &&
                                                    formControls['password'].errors
                                                ">
                                                Password is required
                                            </span>
                                        </div>

                                        <div class="text-center btn-main">
                                            <button type="submit" class="btn btn-info w-50 mt-4 mb-0">
                                                Sign in
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            <div class="forget-pwd">
                                <p>Don't have an account ?<span [routerLink]="['/auth/sign-up']"
                                    routerLinkActive="router-link-active"> <b class="done">Click here</b> </span></p>
                                <a class="cursor-pointer" [routerLink]="['/auth/forget-password']"><a>Forgot
                                    password ? </a><b class="done">Click here</b></a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
