<div class="p-3 top-bar">
    <i class="fa fa-close cursor-pointer" style="font-size: 19px; float: right;" (click)="onClose(false)"></i>
</div>

<div class="pop-up">
    <div class="container-file-upload" appDnd (fileDropped)="onFileDropped($event)">
        <input type="file" #fileDropRef id="fileDropRef" (change)="fileBrowseHandler($event)" />
        <ng-container *ngIf="files && files.length == 0">
            <i class="fa fa-upload" style="font-size: 55px;"></i>
            <h3>Drag and drop file here</h3>
            <h3>or</h3>
        </ng-container>
        <div class="single-file" *ngIf="files && files.length != 0">
            <div class="file-icon" style="width: 50px">
                <i class="fa fa-file-csv" style="font-size: 19px;"></i>
            </div>
            <div class="info">
                <h4 class="name">
                    {{ files?.name }}
                </h4>
            </div>
        </div>

    </div>
    <div class="text-center mt-5">
        <button  *ngIf="files && files.length != 0" class="btn btn-info" (click)="upload()">Procced</button>
    </div>

</div>
